workflows:
  android-workflow:
    name: Android APK Build
    environment:
      flutter: stable
    scripts:
      - name: Unzip Project
        script: |
          unzip Hello-World.zip
          mv Hello-World/* .
          rm -rf Hello-World
          ls -la
      - name: Get Dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
